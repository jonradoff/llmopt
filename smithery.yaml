# Smithery configuration for LLM Optimizer MCP Server
# https://smithery.ai/docs/build/external
#
# Published as: jonradoff/llmopt
# Listing: https://smithery.ai/servers/jonradoff/llmopt
#
startCommand:
  type: http
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: >
          Your LLM Optimizer access key (starts with lok_).
          Create one at https://llmopt.metavert.io under Settings → Access Keys after signing up.
    required: []
