# Smithery configuration for LLM Optimizer MCP Server
# https://smithery.ai/docs/build/external
#
# Published as: jonradoff/llmopt
# Listing: https://smithery.ai/servers/jonradoff/llmopt
#
# To publish manually:
#   smithery auth login
#   smithery mcp publish "https://llmopt.metavert.io/mcp" -n jonradoff/llmopt \
#     --config-schema '{"type":"object","properties":{"apiKey":{"type":"string"}},"required":[]}'

startCommand:
  type: http
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: >
          Your LLM Optimizer API key (starts with lsk_).
          Create one at https://llmopt.metavert.io/last/api after signing up.
    required: []
